services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_api
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port ${API_PORT} --reload
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      - db
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./pyproject.toml
          target: /app/pyproject.toml
        - action: sync
          path: ./uv.lock
          target: /app/uv.lock
        - action: rebuild
          path: Dockerfile

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: finance_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:

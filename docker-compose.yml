services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app
        - action: sync
          path: ./pyproject.toml
          target: /app/pyproject.toml
        - action: sync
          path: ./uv.lock
          target: /app/uv.lock
        - action: rebuild
          path: Dockerfile

  db:
    image: postgres:18-bookworm
    container_name: finance_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

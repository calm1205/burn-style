services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_api
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port ${API_PORT} --reload
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      - db
    volumes:
      - ./backend/alembic:/app/alembic
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: sync
          path: ./backend/pyproject.toml
          target: /app/pyproject.toml
        - action: sync
          path: ./backend/uv.lock
          target: /app/uv.lock
        - action: rebuild
          path: ./backend/Dockerfile

  db:
    build:
      context: ./db
      dockerfile: Dockerfile.db
    container_name: finance_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:

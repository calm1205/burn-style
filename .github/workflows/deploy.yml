name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        options:
          - production
          - preview
      version:
        description: "Release version (production only, e.g. 1.2.0)"
        required: false
        type: string

env:
  # actions/cache@v4 等のJS actionをNode 24で動かす (Node 20は2026/9/16撤去予定)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    uses: ./.github/workflows/deploy_backend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  frontend:
    uses: ./.github/workflows/deploy_frontend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  create-release:
    if: inputs.environment == 'production' && inputs.version != ''
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release notes from commits
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "body<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --notes "${{ steps.notes.outputs.body }}" --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

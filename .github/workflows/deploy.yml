name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        options:
          - production
          - preview
      version:
        description: "Release version (production only, e.g. 1.2.0)"
        required: false
        type: string

jobs:
  backend:
    uses: ./.github/workflows/deploy_backend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  frontend:
    uses: ./.github/workflows/deploy_frontend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  create-release:
    if: inputs.environment == 'production' && inputs.version != ''
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create GitHub Release
        run: gh release create "v${{ inputs.version }}" --generate-notes --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

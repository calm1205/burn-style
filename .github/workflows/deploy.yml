name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        options:
          - production
          - preview

jobs:
  backend:
    uses: ./.github/workflows/deploy_backend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  frontend:
    uses: ./.github/workflows/deploy_frontend.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

name: Deploy Backend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv (with Python and cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version-file: "backend/.python-version"
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: cd backend && uv sync --all-groups

      - name: mypy
        run: cd backend && uv run mypy .

      - name: ruff
        run: cd backend && uv run ruff check .

      - name: test
        run: cd backend && uv run pytest -v

  migrate:
    needs: lint-and-test
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv (with Python and cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version-file: "backend/.python-version"
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: cd backend && uv sync --all-groups

      - name: Run database migrations
        env:
          VERCEL_ENV: production
        run: |
          cd backend
          vercel env pull .env.production --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          set -a
          . .env.production
          set +a
          uv run alembic upgrade head

  deploy:
    needs: [lint-and-test, migrate]
    if: |
      always() &&
      needs.lint-and-test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv (with Python and cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version-file: "backend/.python-version"
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
